<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Pelek Properties | Luxury Airbnb, Rentals & Property Sales in Kenya
    </title>

    <!-- Primary Meta Tags -->
    <meta
      name="title"
      content="Pelek Properties | Luxury Airbnb, Rentals & Property Sales in Kenya"
    />
    <meta
      name="description"
      content="Discover premium Airbnb stays, rentals, and properties for sale across Kenya. Pelek Properties offers luxury accommodations in Nairobi, Mombasa, Diani, and more. Book your perfect stay or find your dream property today."
    />
    <meta name="author" content="Pelek Properties" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://pelekproperties.co.ke" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pelekproperties.co.ke/" />
    <meta
      property="og:title"
      content="Pelek Properties | Luxury Airbnb, Rentals & Property Sales in Kenya"
    />
    <meta
      property="og:description"
      content="Discover premium Airbnb stays, rentals, and properties for sale across Kenya. Book your perfect stay or find your dream property with Pelek Properties."
    />
    <meta
      property="og:image"
      content="https://pelekproperties.co.ke/og-image.svg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Pelek Properties" />
    <meta property="og:locale" content="en_KE" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://pelekproperties.co.ke/" />
    <meta
      name="twitter:title"
      content="Pelek Properties | Luxury Airbnb, Rentals & Property Sales in Kenya"
    />
    <meta
      name="twitter:description"
      content="Discover premium Airbnb stays, rentals, and properties for sale across Kenya. Book your perfect stay or find your dream property."
    />
    <meta
      name="twitter:image"
      content="https://pelekproperties.co.ke/og-image.svg"
    />

    <!-- Additional SEO -->
    <meta
      name="keywords"
      content="Airbnb Kenya, rentals Kenya, property for sale Kenya, luxury stays Kenya, Nairobi Airbnb, Mombasa vacation rental, Diani beach house, Kenya real estate, Pelek Properties, holiday rentals Kenya, Kenya accommodation, Kenya property investment"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#003329" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "Pelek Properties",
        "description": "Premium Airbnb stays, rentals, and properties for sale across Kenya",
        "url": "https://pelekproperties.co.ke",
        "logo": "https://pelekproperties.co.ke/og-image.svg",
        "telephone": "+254711614099",
        "email": "info@pelekproperties.co.ke",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Nairobi",
          "addressCountry": "KE"
        },
        "areaServed": {
          "@type": "Country",
          "name": "Kenya"
        },
        "sameAs": ["https://www.facebook.com/pelekproperties"]
      }
    </script>

    <!-- Structured Data - Website -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Pelek Properties",
        "url": "https://pelekproperties.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://pelekproperties.co.ke/properties?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
